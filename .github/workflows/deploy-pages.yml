name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Angular App
        working-directory: apps/web
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Resolve Build Output
        id: output
        working-directory: apps/web
        run: |
          if [ -d "dist/web/browser" ]; then
            echo "path=dist/web/browser" >> "$GITHUB_OUTPUT"
          else
            echo "path=dist/web" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/${{ steps.output.outputs.path }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
