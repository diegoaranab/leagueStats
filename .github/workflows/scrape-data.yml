name: Scrape Data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Scraper
        run: |
          python -m pip install --upgrade pip
          pip install -e tools/scraper
          python -m playwright install --with-deps chromium

      - name: Run Matrix Scrape
        run: |
          python -m loltee_scraper.run_matrix \
            --output-root apps/web/public/data \
            --regions na lan las \
            --tiers gold_plus platinum_plus emerald_plus diamond_plus d2_plus master_plus \
            --windows current 7d 14d \
            --lanes top jungle middle bottom support

      - name: Commit Updated Data
        run: |
          if [[ -n "$(git status --porcelain apps/web/public/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/web/public/data
            git commit -m "chore(data): refresh static tierlist datasets"
            git push
          else
            echo "No data changes to commit"
          fi
