name: Validate Data Generation

on:
  workflow_dispatch:
  schedule:
    - cron: '47 3 * * *'

env:
  PYTHON_VERSION: '3.12'
  ORACLE_FILE_ID: '1hnpbrUpBMS1TZI7IovfpKeZfWJH1Aptm'
  ORACLE_CSV_PATH: tools/scraper/data/raw/oracles_elixir/2026/2026_LoL_esports_match_data_from_OraclesElixir.csv
  SOLO_OUTPUT_ROOT: apps/web/public/data
  TEAMPLAY_OUTPUT_ROOT: apps/web/public/data/teamplay
  DATA_REGIONS: 'na lan las'
  DATA_TIERS: 'bronze silver gold_plus platinum_plus emerald_plus diamond_plus d2_plus master_plus'
  DATA_WINDOWS: 'current 7d 14d'
  DATA_LANES: 'top jungle middle bottom support'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            tools/scraper/pyproject.toml
            tools/scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e tools/scraper gdown

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Download Oracle's Elixir CSV
        run: |
          mkdir -p "$(dirname "$ORACLE_CSV_PATH")"
          gdown "https://drive.google.com/file/d/${ORACLE_FILE_ID}/view?usp=drive_link" -O "$ORACLE_CSV_PATH"
          test -s "$ORACLE_CSV_PATH"

      - name: Generate Solo Queue datasets
        run: |
          python -m loltee_scraper.run_matrix \
            --output-root "$SOLO_OUTPUT_ROOT" \
            --regions $DATA_REGIONS \
            --tiers $DATA_TIERS \
            --windows $DATA_WINDOWS \
            --lanes $DATA_LANES \
            --fail-fast

      - name: Generate Teamplay datasets
        run: |
          python -m loltee_scraper.build_teamplay \
            --oe-csv "$ORACLE_CSV_PATH" \
            --solo-root "$SOLO_OUTPUT_ROOT" \
            --output-root "$TEAMPLAY_OUTPUT_ROOT" \
            --regions $DATA_REGIONS \
            --tiers $DATA_TIERS \
            --windows $DATA_WINDOWS \
            --fail-fast

      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-data-preview
          path: apps/web/public/data
          retention-days: 7
